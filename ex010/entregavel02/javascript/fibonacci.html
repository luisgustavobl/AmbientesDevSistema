<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Fibonacci</h1>
    <p>Este programa gera a sequência de Fibonacci até uma posição determinada.</p>
    
    <label for="posicaoTabela">Digite a posição desejada:</label>
    <input type="number" id="posicaoTabela">
    <button id="gerar">Gerar Sequência</button>
    
    <p id="resultado"></p>

    <script>
         function fibonacci(n) {
    if (n <= 1) {
        return n;
    }
    return fibonacci(n - 1) + fibonacci(n - 2);
}

if (document.getElementById('gerar')) {
    document.getElementById('gerar').addEventListener('click', function() {
        const posicaoTabelaInput = document.getElementById('posicaoTabela');
        const resultadoP = document.getElementById('resultado');
        const posicaoTabela = parseInt(posicaoTabelaInput.value, 10);

        if (isNaN(posicaoTabela) || posicaoTabela < 0) {
            resultadoP.textContent = 'Por favor, digite um número de termos válido (maior ou igual a 0).';
            return;
        }

        let sequencia = [];
        for (let i = 0; i < posicaoTabela; i++) {
            sequencia.push(fibonacci(i));
        }

        resultadoP.textContent = `A sequência de Fibonacci até o  ${posicaoTabela}°  termo é:  ${sequencia.join(' ')}`;
    });
}
    </script>
    <br>
    <p><a href="javascript.html" rel="prev">Voltar para segunda página</a></p>
</body>
</html>
