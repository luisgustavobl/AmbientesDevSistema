<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de MDC</title>
</head>
<body>
    <h1>Calculadora de MDC</h1>
    <div class="container">
        <h2>Calculadora de MDC</h2>
        <label for="num1">Primeiro número:</label>
        <input type="number" id="num1" placeholder="Digite um número">

        <label for="num2">Segundo número:</label>
        <input type="number" id="num2" placeholder="Digite outro número">

        <button onclick="calcularMDC()">Calcular MDC</button>

        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function mdc(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            let aux = 0;
            while (b !== 0) {
                let aux = b;
                b = a % b;
                a = aux;
            }
            return a;
        }

        function calcularMDC() {
            const num1 = parseInt(document.getElementById("num1").value, 10
        );
            const num2 = parseInt(document.getElementById("num2").value, 10);
            const resultadoDiv = document.getElementById("resultado");

            const resultado = mdc(num1, num2);
            resultadoDiv.textContent = `O MDC de ${num1} e ${num2} é: ${resultado}`;
        }
    </script>
    <p><a href="javascript.html" rel="prev">Voltar para segunda página</a></p>
</body>
</html>
